<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarih Gezgini — Türkiye'nin Tarihi Yerlerini Keşfet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap');

:root {
  --bg: #0a0d14;
  --card: #141824;
  --card2: #1c2235;
  --border: #252d42;
  --text: #e8e6f0;
  --dim: #6b7280;
  --gold: #d4a843;
  --gold2: #f0c060;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #a78bfa;
  --orange: #f97316;
  --teal: #14b8a6;
}

body.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --card2: #f8fafc;
  --border: #e2e8f0;
  --text: #1e293b;
  --dim: #64748b;
  --border: #cbd5e1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background .3s, color .3s; }

/* AUTH */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 30% 20%, #1a0a35 0%, #0a0d14 50%);
  padding: 20px;
}
.auth-wrap { width: 100%; max-width: 400px; }
.auth-logo-area { text-align: center; margin-bottom: 32px; }
.auth-logo-icon { font-size: 52px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(212,168,67,.4)); }
.auth-logo-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold2); }
.auth-logo-sub { font-size: 13px; color: var(--dim); margin-top: 4px; }
.auth-card {
  background: rgba(20,24,36,.9);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(212,168,67,.2);
  border-radius: 20px;
  padding: 32px;
}
.auth-tabs { display: flex; margin-bottom: 24px; background: var(--bg); border-radius: 10px; padding: 4px; }
.auth-tab {
  flex: 1; padding: 9px; border-radius: 8px; border: none;
  background: transparent; color: var(--dim);
  cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s;
}
.auth-tab.active { background: var(--gold); color: #0a0d14; font-weight: 700; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .8px; }
.fg input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; color: var(--text); font-size: 14px;
  transition: all .2s;
}
.fg input:focus { outline: none; border-color: var(--gold); background: rgba(212,168,67,.05); }
.btn-auth {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #d4a843, #f0c060);
  border: none; border-radius: 10px;
  color: #0a0d14; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 4px; letter-spacing: .3px;
  transition: opacity .2s, transform .1s;
}
.btn-auth:hover { opacity: .92; transform: translateY(-1px); }
.auth-msg { font-size: 12px; text-align: center; margin-top: 10px; display: none; padding: 8px; border-radius: 6px; }

/* APP */
#app { display: none; height: 100vh; flex-direction: column; }

/* NAVBAR */
.navbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px; flex-shrink: 0;
  position: relative; z-index: 1000;
  box-shadow: 0 1px 20px rgba(0,0,0,.3);
}
.nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.nav-brand-icon { font-size: 24px; }
.nav-brand-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--gold2); }
.nav-center { display: flex; gap: 2px; }
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; border: none;
  background: transparent; color: var(--dim);
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all .15s;
}
.nav-btn:hover { background: var(--card2); color: var(--text); }
.nav-btn.active { background: rgba(212,168,67,.15); color: var(--gold2); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.tema-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card2);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.tema-btn:hover { border-color: var(--gold); }
.nav-user-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; background: var(--card2);
  border: 1px solid var(--border); border-radius: 20px; font-size: 13px;
}
.btn-cikis {
  padding: 6px 12px; background: transparent;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--dim); cursor: pointer; font-size: 12px;
  transition: all .2s;
}
.btn-cikis:hover { color: var(--red); border-color: var(--red); }

/* MAIN LAYOUT */
.app-body { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 340px; flex-shrink: 0;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 9px 14px 9px 36px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px;
}
.search-wrap input:focus { outline: none; border-color: var(--gold); }
.search-wrap .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--dim); }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.chip {
  padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border); background: var(--card2); color: var(--dim);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.active { background: var(--gold); border-color: var(--gold); color: #0a0d14; font-weight: 700; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.yer-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  transition: all .15s; margin-bottom: 2px; border: 1px solid transparent;
}
.yer-item:hover { background: var(--card2); border-color: var(--border); }
.yer-item.gezildi { border-color: rgba(34,197,94,.2); background: rgba(34,197,94,.05); }
.yer-item.secili { border-color: var(--gold); background: rgba(212,168,67,.1); }
.yer-item-ikon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.yer-item-info { flex: 1; min-width: 0; }
.yer-item-ad { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.yer-item-meta { font-size: 11px; color: var(--dim); margin-top: 1px; }
.yer-item-badge { flex-shrink: 0; }
.gezildi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

/* HARITA */
.map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* İL PANELİ */
.il-panel {
  position: absolute; top: 12px; right: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  min-width: 200px; max-height: 400px; overflow-y: auto;
  display: none; z-index: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.il-panel.open { display: block; }
.il-panel-title { font-size: 13px; font-weight: 700; color: var(--gold2); margin-bottom: 10px; display: flex; justify-content: space-between; }
.il-yer-item { padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12px; }
.il-yer-item:last-child { border-bottom: none; }
.il-yer-item:hover { color: var(--gold); }

/* İSTATİSTİK ÇEKMECESİ */
.stats-drawer {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--card); border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; gap: 16px; align-items: center;
  z-index: 400; box-shadow: 0 -4px 20px rgba(0,0,0,.2);
}
.stat-mini { text-align: center; }
.stat-mini .n { font-size: 20px; font-weight: 700; color: var(--gold2); line-height: 1; }
.stat-mini .l { font-size: 10px; color: var(--dim); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
.stat-divider { width: 1px; height: 32px; background: var(--border); }

/* SAYFA İÇERİKLERİ */
.page-content { flex: 1; overflow: hidden; display: none; }
.page-content.active { display: flex; }

/* PROFIL */
.profil-wrap { flex: 1; overflow-y: auto; padding: 24px; }
.profil-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.profil-stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; text-align: center;
}
.profil-stat .ikon { font-size: 28px; margin-bottom: 8px; }
.profil-stat .sayi { font-size: 26px; font-weight: 700; color: var(--gold2); }
.profil-stat .isim { font-size: 11px; color: var(--dim); margin-top: 2px; }
.progress-item { margin-bottom: 14px; }
.progress-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.progress-bar { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width .6s ease; }

/* ROZETLER */
.rozetler-wrap { flex: 1; overflow-y: auto; padding: 24px; }
.rozet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.rozet-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  transition: all .2s;
}
.rozet-card.kazanildi {
  border-color: var(--gold);
  background: linear-gradient(135deg, rgba(212,168,67,.08), var(--card));
}
.rozet-card.kilitli { opacity: .45; filter: grayscale(.8); }
.rozet-ikon { font-size: 36px; line-height: 1; }
.rozet-ad { font-size: 14px; font-weight: 600; }
.rozet-aciklama { font-size: 11px; color: var(--dim); margin-top: 2px; }
.rozet-kazanildi-badge { font-size: 10px; color: var(--gold2); margin-top: 4px; font-weight: 600; }

/* ROTALAR */
.rotalar-wrap { flex: 1; overflow-y: auto; padding: 24px; }
.rota-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; margin-bottom: 12px;
}
.rota-baslik { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.rota-meta { font-size: 12px; color: var(--dim); margin-bottom: 12px; }
.rota-stops { display: flex; flex-wrap: wrap; gap: 6px; }
.rota-stop {
  padding: 4px 10px; background: var(--card2); border: 1px solid var(--border);
  border-radius: 20px; font-size: 11px; color: var(--text);
}

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  z-index: 2000; align-items: center; justify-content: center; padding: 16px;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto;
}
.modal-head {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.modal-head-title { font-size: 17px; font-weight: 700; }
.modal-close { background: transparent; border: none; color: var(--dim); font-size: 22px; cursor: pointer; line-height: 1; }
.modal-body { padding: 22px; }
.modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

.btn { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-gold { background: var(--gold); color: #0a0d14; }
.btn-gold:hover { background: var(--gold2); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--dim); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-green { background: var(--green); color: white; }
.btn-red { background: var(--red); color: white; }

/* Marker özel */
.custom-marker { cursor: pointer; transition: transform .2s; }
.custom-marker:hover { transform: scale(1.2); }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 100%; height: 45vh; }
  .app-body { flex-direction: column; }
  .nav-center { display: none; }
  .nav-brand-name { font-size: 15px; }
}

/* Leaflet popup */
.leaflet-popup-content-wrapper { background: var(--card) !important; border: 1px solid var(--border) !important; border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,.4) !important; color: var(--text) !important; }
.leaflet-popup-tip { background: var(--card) !important; }
.leaflet-popup-content { margin: 0 !important; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo-area">
      <span class="auth-logo-icon">🏛️</span>
      <div class="auth-logo-title">Tarih Gezgini</div>
      <div class="auth-logo-sub">Türkiye'nin 165+ tarihi yerini keşfet</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('giris')">Giriş Yap</button>
        <button class="auth-tab" onclick="switchTab('kayit')">Kayıt Ol</button>
      </div>
      <div id="form-giris">
        <div class="fg"><label>E-posta</label><input type="email" id="g-email" placeholder="ornek@mail.com" onkeydown="if(event.key==='Enter')giris()"></div>
        <div class="fg"><label>Şifre</label><input type="password" id="g-sifre" placeholder="••••••••" onkeydown="if(event.key==='Enter')giris()"></div>
        <button class="btn-auth" onclick="giris()">🔑 Giriş Yap</button>
        <div class="auth-msg" id="g-msg"></div>
      </div>
      <div id="form-kayit" style="display:none">
        <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="k-ad" placeholder="GezginAli"></div>
        <div class="fg"><label>E-posta</label><input type="email" id="k-email" placeholder="ornek@mail.com"></div>
        <div class="fg"><label>Şifre</label><input type="password" id="k-sifre" placeholder="En az 6 karakter"></div>
        <button class="btn-auth" onclick="kayit()">🚀 Kayıt Ol</button>
        <div class="auth-msg" id="k-msg"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="navbar">
    <div class="nav-brand" onclick="showView('harita')">
      <span class="nav-brand-icon">🏛️</span>
      <span class="nav-brand-name">Tarih Gezgini</span>
    </div>
    <div class="nav-center">
      <button class="nav-btn active" onclick="showView('harita')">🗺️ Harita</button>
      <button class="nav-btn" onclick="showView('profil')">📊 Profilim</button>
      <button class="nav-btn" onclick="showView('rozetler')">🏅 Rozetler</button>
      <button class="nav-btn" onclick="showView('rotalar')">🧭 Rotalar</button>
    </div>
    <div class="nav-right">
      <button class="tema-btn" onclick="toggleTema()" id="tema-btn" title="Tema değiştir">🌙</button>
      <div class="nav-user-chip">
        <span>👤</span>
        <span id="nav-user-name">Gezgin</span>
      </div>
      <button class="btn-cikis" onclick="cikis()">Çıkış</button>
    </div>
  </nav>

  <!-- HARİTA VIEW -->
  <div class="page-content active" id="view-harita">
    <div class="app-body" style="flex:1;position:relative;">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div class="search-wrap">
            <span class="si">🔍</span>
            <input type="text" placeholder="Yer, il, dönem ara..." id="arama" oninput="renderListe()">
          </div>
          <div class="filter-chips" id="chips"></div>
        </div>
        <div class="sidebar-list" id="yer-liste"></div>
      </div>

      <!-- HARİTA -->
      <div class="map-wrap">
        <div id="map"></div>
        <!-- İl Panel -->
        <div class="il-panel" id="il-panel">
          <div class="il-panel-title">
            <span id="il-panel-baslik">İl</span>
            <span onclick="ilPanelKapat()" style="cursor:pointer;color:var(--dim);">✕</span>
          </div>
          <div id="il-panel-liste"></div>
        </div>
        <!-- Stats drawer -->
        <div class="stats-drawer" id="stats-drawer"></div>
      </div>
    </div>
  </div>

  <!-- PROFİL VIEW -->
  <div class="page-content" id="view-profil">
    <div class="profil-wrap">
      <h2 style="font-family:'Playfair Display',serif;color:var(--gold2);margin-bottom:20px;">📊 Gezgin Profilim</h2>
      <div class="profil-grid" id="profil-stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px;">
        <div>
          <h3 style="font-size:14px;color:var(--gold2);margin-bottom:14px;">📈 Kategori İlerlemesi</h3>
          <div id="kat-ilerleme"></div>
        </div>
        <div>
          <h3 style="font-size:14px;color:var(--gold2);margin-bottom:14px;">🗺️ Son Gezilen Yerler</h3>
          <div id="son-gezilen"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROZETLER VIEW -->
  <div class="page-content" id="view-rozetler">
    <div class="rozetler-wrap">
      <h2 style="font-family:'Playfair Display',serif;color:var(--gold2);margin-bottom:20px;">🏅 Rozetlerim</h2>
      <div class="rozet-grid" id="rozet-grid"></div>
    </div>
  </div>

  <!-- ROTALAR VIEW -->
  <div class="page-content" id="view-rotalar">
    <div class="rotalar-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-family:'Playfair Display',serif;color:var(--gold2);">🧭 Rotalarım</h2>
        <button class="btn btn-gold" onclick="yeniRota()">+ Yeni Rota</button>
      </div>
      <div id="rota-liste"></div>
    </div>
  </div>
</div>

<!-- YER DETAY MODAL -->
<div class="modal-bg" id="yerModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title" id="m-baslik"></div>
      <button class="modal-close" onclick="kapat('yerModal')">✕</button>
    </div>
    <div class="modal-body" id="m-icerik"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="kapat('yerModal')">Kapat</button>
      <button class="btn" id="m-gezildi-btn" onclick="modalGezildi()"></button>
    </div>
  </div>
</div>

<!-- ROTA MODAL -->
<div class="modal-bg" id="rotaModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title">🧭 Yeni Rota Oluştur</div>
      <button class="modal-close" onclick="kapat('rotaModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>Rota Adı</label><input type="text" id="r-ad" placeholder="Ege Antik Kentleri"></div>
      <div class="fg"><label>Açıklama</label><input type="text" id="r-aciklama" placeholder="7 günlük rota..."></div>
      <div style="font-size:12px;color:var(--dim);margin:12px 0 8px;">Durakları seç (sırayla):</div>
      <div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;" id="r-yer-secim"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="kapat('rotaModal')">İptal</button>
      <button class="btn btn-gold" onclick="rotaKaydet()">💾 Kaydet</button>
    </div>
  </div>
</div>

// ── SUPABASE ──────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null, q='') {
  const tok = localStorage.getItem('sb_tok') || KEY;
  const h = { 'apikey': KEY, 'Authorization': 'Bearer '+tok, 'Content-Type': 'application/json' };
  if (method==='POST') h['Prefer'] = 'resolution=merge-duplicates';
  const url = SB+'/rest/v1/'+path+(q?'?'+q:'');
  const r = await fetch(url, { method, headers:h, body: body?JSON.stringify(body):null });
  if (!r.ok) { 
    const errText = await r.text();
    console.error('API Error', r.status, errText); 
    return method==='GET' ? [] : null; 
  }
  const t = await r.text(); return t ? JSON.parse(t) : true;
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('form-giris').style.display = t==='giris'?'block':'none';
  document.getElementById('form-kayit').style.display = t==='kayit'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((el,i) => el.classList.toggle('active',(i===0)===(t==='giris')));
}

function showMsg(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.style.background = ok ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)';
  el.style.display = 'block';
}

async function giris() {
  const email = document.getElementById('g-email').value.trim();
  const sifre = document.getElementById('g-sifre').value;
  if (!email||!sifre) { showMsg('g-msg','Tüm alanları doldurun'); return; }
  const r = await fetch(SB+'/auth/v1/token?grant_type=password', {
    method:'POST', headers:{'apikey':KEY,'Content-Type':'application/json'},
    body: JSON.stringify({email, password:sifre})
  });
  const d = await r.json();
  if (!r.ok) { showMsg('g-msg', 'E-posta veya şifre hatalı'); return; }
  localStorage.setItem('sb_tok', d.access_token);
  localStorage.setItem('sb_ref', d.refresh_token);
  localStorage.setItem('sb_usr', JSON.stringify(d.user));
  user = d.user;
  basla();
}

async function kayit() {
  const ad = document.getElementById('k-ad').value.trim();
  const email = document.getElementById('k-email').value.trim();
  const sifre = document.getElementById('k-sifre').value;
  if (!ad||!email||!sifre) { showMsg('k-msg','Tüm alanları doldurun'); return; }
  if (sifre.length<6) { showMsg('k-msg','Şifre en az 6 karakter'); return; }
  const r = await fetch(SB+'/auth/v1/signup', {
    method:'POST', headers:{'apikey':KEY,'Content-Type':'application/json'},
    body: JSON.stringify({email, password:sifre, data:{kullanici_adi:ad}})
  });
  const d = await r.json();
  if (!r.ok) { showMsg('k-msg', d.error_description||'Kayıt hatası'); return; }
  if (d.access_token) {
    localStorage.setItem('sb_tok',d.access_token);
    localStorage.setItem('sb_ref',d.refresh_token);
    localStorage.setItem('sb_usr',JSON.stringify(d.user));
    user = d.user;
    await api('profiller','POST',{id:d.user.id,kullanici_adi:ad});
    basla();
  } else {
    showMsg('k-msg','Kayıt başarılı! Giriş yapabilirsiniz.',true);
    switchTab('giris');
  }
}

function cikis() {
  ['sb_tok','sb_ref','sb_usr'].forEach(k=>localStorage.removeItem(k));
  user=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

async function oturumKontrol() {
  const tok = localStorage.getItem('sb_tok');
  const usr = localStorage.getItem('sb_usr');
  if (tok&&usr) {
    try {
      const r = await fetch(SB+'/auth/v1/user',{headers:{'apikey':KEY,'Authorization':'Bearer '+tok}});
      if (r.ok) { user=JSON.parse(usr); basla(); return; }
    } catch(e){}
  }
  document.getElementById('auth-screen').style.display='flex';
}

// ── BAŞLAT ────────────────────────────────────────────────────────────────
async function basla() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const ad = user?.user_metadata?.kullanici_adi || user?.email?.split('@')[0] || 'Gezgin';
  document.getElementById('nav-user-name').textContent = ad;

  const uid = user.id;
  const [yData, zData, rData] = await Promise.all([
    api('yerler','GET',null,'select=*&order=ad.asc'),
    api('ziyaretler','GET',null,'select=*&user_id=eq.'+uid),
    api('rotalar','GET',null,'select=*&user_id=eq.'+uid)
  ]);
  yerler = yData||[];
  ziyaretler = zData||[];
  rotalar = rData||[];
  console.log('Yüklendi - Yerler:', yerler.length, 'Ziyaretler:', ziyaretler.length, 'Rotalar:', rotalar.length);
  demoRotaEkle();

  renderHarita();
  renderChips();
  renderListe();
  renderStats();
}

function toggleTema() {
  document.body.classList.toggle('light');

// ── HARİTA ────────────────────────────────────────────────────────────────
function renderHarita() {
  if (!map) {
    map = L.map('map', { zoomControl: true }).setView([38.5, 35.0], 6);
    map.on('click', ()=>ilPanelKapat());
    const isLight = document.body.classList.contains('light');
    const tileUrl = isLight 
      ? 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    L.tileLayer(tileUrl, { attribution:'© OpenStreetMap © CARTO', maxZoom:19 }).addTo(map);

    // İl tıklama için il merkezlerine marker ekle
    Object.entries(IL_KOORDINAT).forEach(([il, [lat, lng]]) => {
      const ilYerler = yerler.filter(y=>y.il===il);
      if (ilYerler.length===0) return;
      const ilIcon = L.divIcon({
        className:'',
        html:`<div style="background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.4);color:#d4a843;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(4px);">${il} (${ilYerler.length})</div>`,
        iconSize:[null,null], iconAnchor:[0,0]
      });
      const m = L.marker([lat,lng], {icon:ilIcon}).addTo(map);
      m.on('click', ()=>ilPanelAc(il));
      ilMarkers[il] = m;
    });
  }

  // Yer markerlarını temizle
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers = {};

  const filtreli = aktifKat==='tümü' ? yerler : yerler.filter(y=>y.kategori===aktifKat);
  filtreli.forEach(yer=>{
    if (!yer.lat||!yer.lng) return;
    const gez = gezildi(yer.id);
    const renk = gez ? '#22c55e' : (KAT_RENK[yer.kategori]||'#d4a843');
    const ikon = KAT_IKON[yer.kategori]||'📍';
    const div = L.divIcon({
      className:'',
      html:`<div class="custom-marker" style="width:32px;height:32px;background:${renk};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid ${gez?'#16a34a':'rgba(255,255,255,.3)'};box-shadow:0 2px 8px rgba(0,0,0,.4)${gez?',0 0 0 3px rgba(34,197,94,.25)':''};transition:transform .2s;">${ikon}</div>`,
      iconSize:[32,32], iconAnchor:[16,16]
    });
    const m = L.marker([yer.lat,yer.lng],{icon:div}).addTo(map);
    m.on('click',()=>yerDetay(yer.id));
    m.bindTooltip(`<strong>${yer.ad}</strong><br><small>${yer.il} · ${yer.kategori}</small>`, {direction:'top', offset:[0,-16]});
    markers[yer.id]=m;
  });
}

// ── İL PANELİ ─────────────────────────────────────────────────────────────
function ilPanelAc(il) {
  const ilYerler = yerler.filter(y=>y.il===il);
  document.getElementById('il-panel-baslik').textContent = '📍 ' + il + ' (' + ilYerler.length + ' yer)';
  document.getElementById('il-panel-liste').innerHTML = ilYerler.map(y=>{
    const gez = gezildi(y.id);
    return `<div class="il-yer-item" onclick="yerDetay(${y.id})" style="display:flex;align-items:center;gap:8px;">
      <span>${KAT_IKON[y.kategori]||'📍'}</span>
      <span style="flex:1;">${y.ad}</span>
      ${gez?'<span style="color:var(--green);font-size:10px;">✓</span>':''}
    </div>`;
  }).join('');
  document.getElementById('il-panel').classList.add('open');
}

function ilPanelKapat() {
  document.getElementById('il-panel').classList.remove('open');
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function renderChips() {
  const kats = ['tümü', ...new Set(yerler.map(y=>y.kategori).filter(Boolean))];
  document.getElementById('chips').innerHTML = kats.map(k=>{
    const sayi = k==='tümü' ? yerler.length : yerler.filter(y=>y.kategori===k).length;
    return `<span class="chip ${aktifKat===k?'active':''}" onclick="setKat('${k}')">${KAT_IKON[k]||''} ${k} ${sayi}</span>`;
  }).join('');
}

function setKat(k) {
  aktifKat = k;
  renderChips();
  renderHarita();
  renderListe();
}

function renderListe() {
  const q = (document.getElementById('arama')?.value||'').toLowerCase();
  let liste = aktifKat==='tümü' ? yerler : yerler.filter(y=>y.kategori===aktifKat);
  if (q) liste = liste.filter(y=>
    (y.ad||'').toLowerCase().includes(q)||
    (y.il||'').toLowerCase().includes(q)||
    (y.donem||'').toLowerCase().includes(q)||
    (y.kategori||'').toLowerCase().includes(q)
  );

  document.getElementById('yer-liste').innerHTML = liste.map(yer=>{
    const gez = gezildi(yer.id);
    const renk = KAT_RENK[yer.kategori]||'#d4a843';
    return `<div class="yer-item ${gez?'gezildi':''} ${seciliYerId===yer.id?'secili':''}" onclick="yerDetay(${yer.id})">
      <div class="yer-item-ikon" style="background:${renk}22;">${KAT_IKON[yer.kategori]||'📍'}</div>
      <div class="yer-item-info">
        <div class="yer-item-ad">${yer.ad}</div>
        <div class="yer-item-meta">${yer.il||''} · ${yer.donem||''}</div>
      </div>
      ${gez?'<div class="gezildi-dot"></div>':''}
    </div>`;
  }).join('') || '<div style="color:var(--dim);text-align:center;padding:30px;font-size:13px;">Yer bulunamadı</div>';
}

// ── YER DETAY ─────────────────────────────────────────────────────────────

  if (!y) return;
  seciliYerId = id;
  renderListe();

  const gez = gezildi(id);
  const ziy = ziyaretler.find(z=>z.yer_id===id);
  const renk = KAT_RENK[y.kategori]||'#d4a843';

  document.getElementById('m-baslik').innerHTML = `${KAT_IKON[y.kategori]||''} ${y.ad}`;
  document.getElementById('m-icerik').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      <div style="padding:10px;background:var(--card2);border-radius:8px;border-left:3px solid ${renk};">
        <div style="font-size:10px;color:var(--dim);margin-bottom:3px;">KATEGORİ</div>

      </div>

        <div style="font-size:10px;color:var(--dim);margin-bottom:3px;">DÖNEM</div>
        <div style="font-weight:600;font-size:13px;">${y.donem||'Belirsiz'}</div>
      </div>
      <div style="padding:10px;background:var(--card2);border-radius:8px;border-left:3px solid var(--blue);">
        <div style="font-size:10px;color:var(--dim);margin-bottom:3px;">KONUM</div>
        <div style="font-weight:600;font-size:13px;">📍 ${y.il}${y.ilce?', '+y.ilce:''}</div>
      </div>
      <div style="padding:10px;background:var(--card2);border-radius:8px;border-left:3px solid var(--gold);">
        <div style="font-size:10px;color:var(--dim);margin-bottom:3px;">ÖNEM</div>
        <div style="font-weight:600;font-size:13px;">${'⭐'.repeat(y.onem||1)}</div>
      </div>
    </div>
    <div style="padding:14px;background:var(--card2);border-radius:10px;line-height:1.7;font-size:13px;color:var(--text);margin-bottom:16px;">${y.aciklama||'Açıklama mevcut değil.'}</div>
    ${gez ? `<div style="padding:10px 14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;"><span style="color:var(--green);font-size:18px;">✓</span><div><div style="font-weight:600;color:var(--green);">Gezildi!</div>${ziy?.tarih?`<div style="font-size:11px;color:var(--dim);">Tarih: ${ziy.tarih}</div>`:''}</div></div>` : ''}
    <div class="fg"><label>Ziyaret Tarihi (opsiyonel)</label><input type="date" id="m-tarih" value="${ziy?.tarih||''}" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;width:100%;"></div>
  `;

  const btn = document.getElementById('m-gezildi-btn');
  btn.textContent = gez ? '✕ Gezildi İşaretini Kaldır' : '✓ Gezildi İşaretle';
  btn.className = 'btn ' + (gez ? 'btn-red' : 'btn-green');

  ac('yerModal');

  // Haritada vurgula
  if (markers[id] && y.lat && y.lng) {
    map.setView([y.lat, y.lng], 13, {animate:true});
  }
}

async function modalGezildi() {
  if (!seciliYerId) return;
  const gez = gezildi(seciliYerId);
  const tarih = document.getElementById('m-tarih')?.value || new Date().toISOString().slice(0,10);
  if (gez) {
    const z = ziyaretler.find(v=>v.yer_id===seciliYerId);
    await api('ziyaretler?id=eq.'+z.id, 'DELETE');
    ziyaretler = ziyaretler.filter(v=>v.yer_id!==seciliYerId);
  } else {
    const yeni = {user_id:user.id, yer_id:seciliYerId, tarih};
    const r = await api('ziyaretler','POST',yeni);
    const eklenen = Array.isArray(r)&&r[0] ? r[0] : {...yeni,id:Date.now()};
    ziyaretler.push(eklenen);
  }
  kapat('yerModal');
  renderHarita();
  renderListe();
  renderStats();
}

// ── PROFİL ────────────────────────────────────────────────────────────────
function renderProfil() {
  const gez = ziyaretler.length;
  const top = yerler.length;
  const ad = user?.user_metadata?.kullanici_adi || user?.email?.split('@')[0];
  const iller = new Set(ziyaretler.map(z=>yerler.find(y=>y.id===z.yer_id)?.il).filter(Boolean)).size;
  const katSay = {};
  ziyaretler.forEach(z=>{ const y=yerler.find(x=>x.id===z.yer_id); if(y) katSay[y.kategori]=(katSay[y.kategori]||0)+1; });

  document.getElementById('profil-stats').innerHTML = `
    <div class="profil-stat" style="grid-column:span 2;background:linear-gradient(135deg,rgba(212,168,67,.1),var(--card));">
      <div class="ikon">🧭</div>
      <div class="sayi">${gez} / ${top}</div>
      <div class="isim">${ad} · ${Math.round(gez/top*100)}% tamamlandı</div>
    </div>
    <div class="profil-stat"><div class="ikon">📍</div><div class="sayi" style="color:var(--blue)">${iller}</div><div class="isim">Farklı İl</div></div>
    ${Object.entries(katSay).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>
      `<div class="profil-stat"><div class="ikon">${KAT_IKON[k]||'📍'}</div><div class="sayi" style="color:var(--gold2)">${v}</div><div class="isim">${k}</div></div>`
    ).join('')}
  `;

  // Kategori ilerleme
  const kats = [...new Set(yerler.map(y=>y.kategori).filter(Boolean))];
  document.getElementById('kat-ilerleme').innerHTML = kats.map(k=>{
    const t = yerler.filter(y=>y.kategori===k).length;
    const g = ziyaretler.filter(z=>yerler.find(y=>y.id===z.yer_id)?.kategori===k).length;
    const p = t>0?Math.round(g/t*100):0;
    return `<div class="progress-item">
      <div class="progress-head"><span>${KAT_IKON[k]||''} ${k}</span><span style="color:var(--gold2)">${g}/${t}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${KAT_RENK[k]||'var(--gold)'}"></div></div>
    </div>`;
  }).join('');

  // Son gezilen
  const son = [...ziyaretler].sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)).slice(0,8);
  document.getElementById('son-gezilen').innerHTML = son.map(z=>{
    const y = yerler.find(x=>x.id===z.yer_id);
    if(!y) return '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:8px;margin-bottom:6px;cursor:pointer;" onclick="showView('harita');setTimeout(()=>yerDetay(${y.id}),100)">
      <span style="font-size:20px;">${KAT_IKON[y.kategori]||'📍'}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${y.ad}</div>
        <div style="font-size:11px;color:var(--dim);">${y.il}</div>
      </div>
      ${z.tarih?`<div style="font-size:11px;color:var(--dim);">${z.tarih}</div>`:''}
    </div>`;
  }).join('') || '<div style="color:var(--dim);font-size:13px;">Henüz ziyaret yok</div>';
}

// ── ROZETLER ──────────────────────────────────────────────────────────────
const ROZETLER = [
  {ikon:'🏺',ad:'İlk Adım',ac:'İlk tarihi yeri ziyaret et',kontrol:(z,y)=>z.length>=1},
  {ikon:'👣',ad:'Meraklı Gezgin',ac:'5 yer gez',kontrol:(z)=>z.length>=5},
  {ikon:'🗺️',ad:'Deneyimli Gezgin',ac:'25 yer gez',kontrol:(z)=>z.length>=25},
  {ikon:'🌟',ad:'Usta Gezgin',ac:'50 yer gez',kontrol:(z)=>z.length>=50},
  {ikon:'🏆',ad:'Efsane Gezgin',ac:'100 yer gez',kontrol:(z)=>z.length>=100},
  {ikon:'🎭',ad:'Tiyatro Sever',ac:'3 antik tiyatro gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.kategori==='antik tiyatro').length>=3},
  {ikon:'🎪',ad:'Tiyatro Ustası',ac:'10 antik tiyatro gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.kategori==='antik tiyatro').length>=10},
  {ikon:'🏛️',ad:'Müze Kurdu',ac:'5 müze gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.kategori==='müze').length>=5},
  {ikon:'🏺',ad:'Antik Âşığı',ac:'10 antik kent gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.kategori==='antik kent').length>=10},
  {ikon:'🏰',ad:'Kale Fatihi',ac:'5 kale gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.kategori==='kale').length>=5},
  {ikon:'🗿',ad:'Zamanın Başlangıcı',ac:'Göbeklitepe\'yi ziyaret et',kontrol:(z,y)=>z.some(v=>y.find(r=>r.id===v.yer_id)?.ad==='Göbeklitepe')},
  {ikon:'⚡',ad:'Efes\'in İzinde',ac:'Efes Antik Kenti\'ni ziyaret et',kontrol:(z,y)=>z.some(v=>y.find(r=>r.id===v.yer_id)?.ad==='Efes Antik Kenti')},
  {ikon:'👑',ad:'Tanrıların Yanında',ac:'Nemrut Dağı\'nı ziyaret et',kontrol:(z,y)=>z.some(v=>y.find(r=>r.id===v.yer_id)?.ad==='Nemrut Dağı')},
  {ikon:'🚗',ad:'Gezgin Yolcu',ac:'3 farklı ilde yer gez',kontrol:(z,y)=>new Set(z.map(v=>y.find(r=>r.id===v.yer_id)?.il).filter(Boolean)).size>=3},
  {ikon:'✈️',ad:'7 Bölge Gezgini',ac:'7 farklı ilde yer gez',kontrol:(z,y)=>new Set(z.map(v=>y.find(r=>r.id===v.yer_id)?.il).filter(Boolean)).size>=7},
  {ikon:'🌊',ad:'Ege Gezgini',ac:'İzmir veya Muğla\'da 5 yer gez',kontrol:(z,y)=>z.filter(v=>['İzmir','Muğla'].includes(y.find(r=>r.id===v.yer_id)?.il)).length>=5},
  {ikon:'🏔️',ad:'Dağ Dağ Gezerim',ac:'Antalya\'da 5 yer gez',kontrol:(z,y)=>z.filter(v=>y.find(r=>r.id===v.yer_id)?.il==='Antalya').length>=5},
];

function renderRozetler() {
  document.getElementById('rozet-grid').innerHTML = ROZETLER.map(r=>{
    const kaz = r.kontrol(ziyaretler, yerler);
    return `<div class="rozet-card ${kaz?'kazanildi':'kilitli'}">
      <div class="rozet-ikon">${r.ikon}</div>
      <div>
        <div class="rozet-ad">${r.ad}</div>
        <div class="rozet-aciklama">${r.ac}</div>
        ${kaz?'<div class="rozet-kazanildi-badge">✓ Kazanıldı!</div>':''}
      </div>
    </div>`;
  }).join('');
}

// ── ROTALAR ───────────────────────────────────────────────────────────────
function renderRotalar() {
  document.getElementById('rota-liste').innerHTML = rotalar.length ? rotalar.map(r=>{
    const ids = r.yer_idleri||[];
    const adlar = ids.map(id=>yerler.find(y=>y.id===id)?.ad).filter(Boolean);
    return `<div class="rota-card">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:6px;">
        <div>
          <div class="rota-baslik">🧭 ${r.ad}</div>
          <div class="rota-meta">${ids.length} durak${r.aciklama?' · '+r.aciklama:''}</div>
        </div>
        <button onclick="rotaSil(${r.id})" style="background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px;" title="Sil">🗑️</button>
      </div>
      <div class="rota-stops">${adlar.map((ad,i)=>`<span class="rota-stop">${i+1}. ${ad}</span>`).join('')}</div>
    </div>`;
  }).join('') : '<div style="color:var(--dim);text-align:center;padding:40px;">Henüz rota oluşturulmadı.<br><small>Sağ üstteki + butonuna tıkla.</small></div>';
}

function demoRotaEkle() {
  if (rotalar.length > 0 || yerler.length === 0) return;
  const ege = yerler.filter(y=>['İzmir','Muğla','Aydın'].includes(y.il)&&y.kategori==='antik kent').slice(0,6).map(y=>y.id);
  const kapadokya = yerler.filter(y=>['Nevşehir','Aksaray'].includes(y.il)).slice(0,5).map(y=>y.id);
  if (ege.length) rotalar.push({id:1,ad:'Ege Antik Kentleri Turu',aciklama:'7 günlük Ege rotası',yer_idleri:ege,user_id:user?.id});
  if (kapadokya.length) rotalar.push({id:2,ad:'Kapadokya Keşif Rotası',aciklama:'Peri bacaları ve kiliseler',yer_idleri:kapadokya,user_id:user?.id});
}

function yeniRota() {
  rotaSecim = [];
  document.getElementById('r-ad').value='';
  document.getElementById('r-aciklama').value='';
  document.getElementById('r-yer-secim').innerHTML = yerler.map(y=>`
    <div onclick="rotaYerSec(${y.id},this)" id="rs-${y.id}" style="padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;border:1px solid transparent;transition:all .15s;margin-bottom:2px;">
      ${KAT_IKON[y.kategori]||'📍'} ${y.ad} <span style="color:var(--dim)">· ${y.il}</span>
    </div>`).join('');
  ac('rotaModal');
}

function rotaYerSec(id, el) {
  const idx = rotaSecim.indexOf(id);
  if (idx===-1) {
    rotaSecim.push(id);
    el.style.background='rgba(212,168,67,.15)';
    el.style.borderColor='var(--gold)';
  } else {
    rotaSecim.splice(idx,1);
    el.style.background='';
    el.style.borderColor='transparent';
  }
}

async function rotaKaydet() {
  const ad = document.getElementById('r-ad').value.trim();
  if (!ad) { alert('Rota adı girin'); return; }
  const yeni = { user_id:user.id, ad, aciklama:document.getElementById('r-aciklama').value, yer_idleri:rotaSecim };
  const r = await api('rotalar','POST',yeni);
  rotalar.push({...yeni, id:Date.now()});
  renderRotalar();
  kapat('rotaModal');
}

async function rotaSil(id) {
  if (!confirm('Bu rota silinsin mi?')) return;
  await api('rotalar?id=eq.'+id,'DELETE');
  rotalar = rotalar.filter(r=>r.id!==id);
  renderRotalar();
}

// ── NAVİGASYON ────────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+v)?.classList.add('active');
  document.querySelector(`.nav-btn[onclick*="${v}"]`)?.classList.add('active');
  if (v==='profil') renderProfil();
  if (v==='rozetler') renderRozetler();
  if (v==='rotalar') renderRotalar();
  if (v==='harita') { setTimeout(()=>map?.invalidateSize(),100); }
}

function ac(id) { document.getElementById(id).classList.add('open'); }
function kapat(id) { document.getElementById(id).classList.remove('open'); seciliYerId=null; renderListe(); }

document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) { m.classList.remove('open'); seciliYerId=null; renderListe(); } });
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.modal-bg.open').forEach(m=>{ m.classList.remove('open'); seciliYerId=null; }); });

oturumKontrol();
</script>
</body>
</html>
